name: ISOSerial Crawler

# PAUSED 2026-05-02 — eBay daily quota exhausted; crawler hourly + ISOsnipe twice-daily
# + dashboard live lookups were stacking past the 5K/day Browse API cap. While paused,
# the dashboard cache layer (ebay_lookup_cache) fills up organically as users browse,
# and ISOsnipe still runs (twice-daily, lower volume). Re-enable schedule once eBay
# production-tier quota is approved (5M/day) or we add a quota-aware throttle.
#
# To re-enable: restore the `schedule` block below.

on:
  workflow_dispatch: {}      # manual trigger only while paused

concurrency:
  # Skip a run if the previous run is still going. Prevents overlap if a bootstrap
  # surge causes a run to take longer than 30 min.
  group: iso-serial-crawler
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 10      # hard cap — we expect <1 min in steady state

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install deps (dotenv only)
        run: npm ci --omit=dev || npm install --omit=dev

      - name: Run ISOSerial crawler
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node iso-serial/runner.js

      - name: Update AI learning stats
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node iso-serial/compute-stats.js
        continue-on-error: true   # non-fatal — crawler result matters more than stats rollup
