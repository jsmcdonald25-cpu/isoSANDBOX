name: Market Meter Collector

# Daily at 06:00 UTC (~1am CST).
# Pulls ~300 eBay Browse queries = well under 5,000/day free tier.
# Runtime: ~2-3 min at SLEEP_MS=250 per player.

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}      # allow manual trigger from Actions tab

concurrency:
  group: market-meter-collector
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install deps
        run: npm ci --omit=dev || npm install --omit=dev

      - name: Run Market Meter collector
        env:
          EBAY_CLIENT_ID:            ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET:        ${{ secrets.EBAY_CLIENT_SECRET }}
          SUPABASE_URL:              ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node iso-market/collect.js
