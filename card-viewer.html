<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>GrailISO — 3D Card Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0D1F33; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:'Barlow Condensed',sans-serif; color:#fff; padding:2rem; }

/* Back button */
.back-btn {
  position:fixed; top:1.2rem; left:1.2rem;
  display:flex; align-items:center; gap:0.5rem;
  background:rgba(0,170,255,0.1); border:1px solid rgba(0,170,255,0.3);
  color:#00AAFF; padding:0.5rem 1rem; border-radius:6px;
  cursor:pointer; font-size:0.8rem; letter-spacing:0.1em;
  text-transform:uppercase; font-family:'Barlow Condensed',sans-serif;
  text-decoration:none; transition:background 0.2s;
  z-index:1000;
}
.back-btn:hover { background:rgba(0,170,255,0.25); }
.back-btn svg { width:14px; height:14px; }

h1 { font-size:1.1rem; letter-spacing:0.2em; color:#00AAFF; margin-bottom:1.5rem; text-transform:uppercase; }
.wrap { position:relative; width:280px; height:392px; margin:0 auto; }
.shadow { position:absolute; inset:0; border-radius:10px; box-shadow:0 20px 50px rgba(0,170,255,0.4); pointer-events:none; z-index:0; }
.scene { position:absolute; inset:0; perspective:1200px; cursor:grab; user-select:none; z-index:1; }
.scene:active { cursor:grabbing; }
.card { width:100%; height:100%; position:relative; transform-style:preserve-3d; }
.front-face {
  position:absolute; width:280px; height:392px; top:0; left:0;
  backface-visibility:hidden; -webkit-backface-visibility:hidden;
  border-radius:10px; overflow:visible; background:#000;
}
.front-face img { width:100%; height:100%; object-fit:fill; display:block; border-radius:10px; overflow:hidden; }
.back-face {
  position:absolute; width:392px; height:280px;
  top:56px; left:-56px;
  backface-visibility:hidden; -webkit-backface-visibility:hidden;
  transform:rotateY(180deg);
  border-radius:10px; overflow:hidden; background:#000;
}
.back-face img { width:100%; height:100%; object-fit:fill; display:block; }
.glare { position:absolute; inset:0; pointer-events:none; opacity:0; z-index:2; border-radius:10px; transition:opacity 0.1s; }

/* Blemish dots */
.dot {
  position:absolute;
  width:18px; height:18px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,0.6);
  cursor:pointer;
  z-index:10;
  transform:translate(-50%,-50%);
  transition:transform 0.15s, box-shadow 0.15s;
  animation:pulse 2.5s infinite;
}
.dot:hover { transform:translate(-50%,-50%) scale(1.3); animation:none; }
.dot.minor  { background:rgba(255,210,0,0.85);  box-shadow:0 0 8px rgba(255,210,0,0.7); }
.dot.moderate{ background:rgba(255,140,0,0.85); box-shadow:0 0 8px rgba(255,140,0,0.7); }
.dot.major  { background:rgba(255,59,92,0.85);  box-shadow:0 0 8px rgba(255,59,92,0.7); }
.dot.clean  { background:rgba(0,232,135,0.85);  box-shadow:0 0 8px rgba(0,232,135,0.7); }

@keyframes pulse {
  0%,100% { opacity:1; }
  50% { opacity:0.55; }
}

/* Tooltip */
.tooltip {
  position:absolute;
  background:#0D1F33;
  border:1px solid rgba(0,170,255,0.4);
  border-radius:8px;
  padding:0.6rem 0.8rem;
  width:180px;
  font-size:0.72rem;
  line-height:1.5;
  z-index:999;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.15s;
  box-shadow:0 8px 24px rgba(0,0,0,0.5);
}
.tooltip.visible { opacity:1; }
.tooltip .tt-title { font-weight:700; font-size:0.8rem; margin-bottom:0.2rem; text-transform:uppercase; letter-spacing:0.08em; }
.tooltip .tt-sev   { font-size:0.65rem; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:0.3rem; }
.tooltip .tt-desc  { color:#B8D4F0; }
.tooltip .tt-impact{ color:#7A95AE; font-size:0.65rem; margin-top:0.3rem; }
.minor-tt  .tt-sev { color:#FFD200; }
.moderate-tt .tt-sev { color:#FF8C00; }
.major-tt  .tt-sev { color:#FF3B5C; }
.clean-tt  .tt-sev { color:#00E887; }

/* Toggle switch */
.blemish-toggle {
  display:flex; align-items:center; gap:0.7rem;
  margin-top:1rem;
  font-size:0.75rem; letter-spacing:0.12em; text-transform:uppercase; color:#7A95AE;
}
.switch {
  position:relative; width:42px; height:22px;
  display:inline-block;
}
.switch input { opacity:0; width:0; height:0; }
.slider {
  position:absolute; cursor:pointer;
  top:0; left:0; right:0; bottom:0;
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(0,170,255,0.3);
  border-radius:22px;
  transition:background 0.25s;
}
.slider:before {
  position:absolute; content:"";
  height:16px; width:16px;
  left:2px; bottom:2px;
  background:#7A95AE;
  border-radius:50%;
  transition:transform 0.25s, background 0.25s;
}
input:checked + .slider { background:rgba(0,170,255,0.25); border-color:#00AAFF; }
input:checked + .slider:before { transform:translateX(20px); background:#00AAFF; }

/* Grade bar */
.grade-bar { margin-top:1.5rem; display:flex; gap:1.5rem; background:rgba(0,170,255,0.08); border:1px solid rgba(0,170,255,0.25); border-radius:10px; padding:0.7rem 1.5rem; }
.gi { text-align:center; }
.gi .lbl { font-size:0.6rem; color:#7A95AE; letter-spacing:0.1em; text-transform:uppercase; }
.gi .val { font-size:1.3rem; font-weight:700; color:#00AAFF; }
.gi .val.overall { color:#00E887; font-size:1.7rem; }
.controls { display:flex; gap:0.8rem; margin-top:1.2rem; }
.btn { background:rgba(0,170,255,0.12); border:1px solid rgba(0,170,255,0.35); color:#00AAFF; padding:0.55rem 1.2rem; border-radius:6px; cursor:pointer; font-size:0.8rem; letter-spacing:0.1em; text-transform:uppercase; font-family:inherit; transition:background 0.2s; }
.btn:hover { background:rgba(0,170,255,0.28); }
.side-label { margin-top:0.8rem; font-size:0.7rem; letter-spacing:0.15em; color:#7A95AE; text-transform:uppercase; }
.hint { margin-top:0.5rem; font-size:0.65rem; color:#4A6580; letter-spacing:0.1em; text-transform:uppercase; }

/* Legend */
.legend {
  display:flex; gap:1rem; margin-top:0.8rem;
  font-size:0.65rem; letter-spacing:0.08em; text-transform:uppercase; color:#7A95AE;
}
.legend-item { display:flex; align-items:center; gap:0.35rem; }
.legend-dot { width:10px; height:10px; border-radius:50%; border:1px solid rgba(255,255,255,0.4); }
</style>
</head>
<body>

<a href="https://grailiso.com" class="back-btn">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="15 18 9 12 15 6"/>
  </svg>
  Back
</a>

<h1>GrailISO — Card Viewer</h1>

<div class="wrap">
  <div class="shadow"></div>
  <div class="scene" id="scene">
    <div class="card" id="card">

      <!-- FRONT FACE -->
      <div class="front-face" id="front-face">
        <img src="images/card-front.png" />
        <div class="glare" id="gf"></div>

        <!-- Blemish dots (front) -->
        <div class="dot minor"   id="d1" style="left:14%;top:8%"   data-side="front"></div>
        <div class="dot moderate" id="d2" style="left:88%;top:7%"  data-side="front"></div>
        <div class="dot minor"   id="d3" style="left:10%;top:92%"  data-side="front"></div>
        <div class="dot major"   id="d4" style="left:87%;top:91%"  data-side="front"></div>
        <div class="dot minor"   id="d5" style="left:6%;top:50%"   data-side="front"></div>
        <div class="dot clean"   id="d6" style="left:52%;top:52%"  data-side="front"></div>
      </div>

      <!-- BACK FACE -->
      <div class="back-face" id="back-face">
        <img src="images/card-back.png" />
        <div class="glare" id="gb"></div>
      </div>

    </div>
  </div>
</div>

<!-- Tooltip (shared, moved by JS) -->
<div class="tooltip" id="tooltip">
  <div class="tt-title" id="tt-title"></div>
  <div class="tt-sev"   id="tt-sev"></div>
  <div class="tt-desc"  id="tt-desc"></div>
  <div class="tt-impact" id="tt-impact"></div>
</div>

<!-- Grade bar -->
<div class="grade-bar">
  <div class="gi"><div class="lbl">Corners</div><div class="val">8.5</div></div>
  <div class="gi"><div class="lbl">Edges</div><div class="val">9.0</div></div>
  <div class="gi"><div class="lbl">Surface</div><div class="val">8.5</div></div>
  <div class="gi"><div class="lbl">Centering</div><div class="val">9.0</div></div>
  <div class="gi"><div class="lbl">Overall</div><div class="val overall">8.5</div></div>
</div>

<!-- Blemish toggle -->
<div class="blemish-toggle">
  <label class="switch">
    <input type="checkbox" id="blemish-toggle" checked>
    <span class="slider"></span>
  </label>
  Show Blemishes
</div>

<!-- Legend -->
<div class="legend" id="blemish-legend">
  <div class="legend-item"><div class="legend-dot" style="background:#FFD200"></div>Minor</div>
  <div class="legend-item"><div class="legend-dot" style="background:#FF8C00"></div>Moderate</div>
  <div class="legend-item"><div class="legend-dot" style="background:#FF3B5C"></div>Major</div>
  <div class="legend-item"><div class="legend-dot" style="background:#00E887"></div>Clean</div>
</div>

<!-- Controls -->
<div class="controls">
  <button class="btn" id="flip-btn">Flip Card</button>
  <button class="btn" id="spin-btn">Auto Spin</button>
  <button class="btn" id="reset-btn">Reset</button>
</div>
<div class="side-label" id="side-label">FRONT</div>
<div class="hint">Drag to rotate &nbsp;&bull;&nbsp; Scroll to tilt &nbsp;&bull;&nbsp; Hover dots for grading notes</div>

<script>
// Blemish data
var blemishData = {
  d1: { title:'Top-Left Corner', sev:'Minor', cls:'minor-tt',   desc:'Light corner fraying, barely visible under inspection.', impact:'Grade impact: -0.5 on Corners' },
  d2: { title:'Top-Right Corner',sev:'Minor', cls:'minor-tt',   desc:'Slight compression mark on corner tip.', impact:'Grade impact: -0.5 on Corners' },
  d3: { title:'Bottom-Left Corner',sev:'Minor', cls:'minor-tt', desc:'Minor corner wear, consistent with age.', impact:'Grade impact: none at this grade' },
  d4: { title:'Bottom-Right Corner',sev:'Major',cls:'major-tt', desc:'Visible corner ding with white stress lines.', impact:'Grade impact: -1.5 on Corners' },
  d5: { title:'Left Edge',        sev:'Minor', cls:'minor-tt',  desc:'Faint edge nick, visible at certain angles.', impact:'Grade impact: -0.5 on Edges' },
  d6: { title:'Surface',          sev:'Clean', cls:'clean-tt',  desc:'Surface is clean — no visible scratches or print defects.', impact:'No grade impact' },
};

var card=document.getElementById('card');
var scene=document.getElementById('scene');
var gf=document.getElementById('gf');
var gb=document.getElementById('gb');
var sideLabel=document.getElementById('side-label');
var tooltip=document.getElementById('tooltip');
var dots=document.querySelectorAll('.dot');
var dotsVisible=true;

var rotX=0,rotY=0,isFlipped=false,dragging=false,lastX=0,lastY=0,spinner=null,spinning=false;

function applyTransform(){
  card.style.transform='rotateY('+(rotY+(isFlipped?180:0))+'deg) rotateX('+rotX+'deg)';
  sideLabel.textContent=isFlipped?'BACK':'FRONT';
  // Only show dots on front side
  dots.forEach(function(d){
    d.style.display = (dotsVisible && !isFlipped) ? 'block' : 'none';
  });
}

// Drag
scene.addEventListener('mousedown',function(e){
  dragging=true;lastX=e.clientX;lastY=e.clientY;
  if(spinner){clearInterval(spinner);spinner=null;spinning=false;document.getElementById('spin-btn').textContent='Auto Spin';}
});
window.addEventListener('mousemove',function(e){
  if(!dragging)return;
  rotY+=(e.clientX-lastX)*0.5;rotX-=(e.clientY-lastY)*0.5;
  rotX=Math.max(-60,Math.min(60,rotX));lastX=e.clientX;lastY=e.clientY;
  var r=scene.getBoundingClientRect();
  var g='radial-gradient(ellipse at '+((e.clientX-r.left)/r.width*100).toFixed(1)+'% '+((e.clientY-r.top)/r.height*100).toFixed(1)+'%, rgba(255,255,255,0.16) 0%, transparent 65%)';
  gf.style.background=gb.style.background=g;gf.style.opacity=gb.style.opacity='1';
  applyTransform();
  tooltip.classList.remove('visible');
});
window.addEventListener('mouseup',function(){dragging=false;gf.style.opacity=gb.style.opacity='0';});
scene.addEventListener('wheel',function(e){e.preventDefault();rotX=Math.max(-60,Math.min(60,rotX+e.deltaY*0.08));applyTransform();},{passive:false});

// Touch
scene.addEventListener('touchstart',function(e){lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;});
scene.addEventListener('touchmove',function(e){
  e.preventDefault();
  rotY+=(e.touches[0].clientX-lastX)*0.5;rotX-=(e.touches[0].clientY-lastY)*0.5;
  rotX=Math.max(-60,Math.min(60,rotX));lastX=e.touches[0].clientX;lastY=e.touches[0].clientY;
  applyTransform();
  tooltip.classList.remove('visible');
},{passive:false});

// Buttons
document.getElementById('flip-btn').addEventListener('click',function(){
  isFlipped=!isFlipped;rotY=0;rotX=0;applyTransform();
  tooltip.classList.remove('visible');
});
document.getElementById('spin-btn').addEventListener('click',function(){
  if(spinning){clearInterval(spinner);spinner=null;spinning=false;this.textContent='Auto Spin';}
  else{spinning=true;this.textContent='Stop';spinner=setInterval(function(){rotY+=1;applyTransform();},16);}
});
document.getElementById('reset-btn').addEventListener('click',function(){
  rotX=0;rotY=0;isFlipped=false;
  if(spinner){clearInterval(spinner);spinner=null;spinning=false;document.getElementById('spin-btn').textContent='Auto Spin';}
  applyTransform();
});

// Blemish toggle
document.getElementById('blemish-toggle').addEventListener('change',function(){
  dotsVisible=this.checked;
  document.getElementById('blemish-legend').style.opacity=dotsVisible?'1':'0.3';
  applyTransform();
  tooltip.classList.remove('visible');
});

// Dot tooltips
dots.forEach(function(dot){
  var id=dot.id;
  var data=blemishData[id];
  if(!data)return;

  dot.addEventListener('mouseenter',function(e){
    document.getElementById('tt-title').textContent=data.title;
    document.getElementById('tt-sev').textContent=data.sev;
    document.getElementById('tt-desc').textContent=data.desc;
    document.getElementById('tt-impact').textContent=data.impact;
    tooltip.className='tooltip visible '+data.cls;
    positionTooltip(e);
  });
  dot.addEventListener('mousemove',function(e){ positionTooltip(e); });
  dot.addEventListener('mouseleave',function(){ tooltip.classList.remove('visible'); });

  // Touch
  dot.addEventListener('touchstart',function(e){
    e.stopPropagation();
    document.getElementById('tt-title').textContent=data.title;
    document.getElementById('tt-sev').textContent=data.sev;
    document.getElementById('tt-desc').textContent=data.desc;
    document.getElementById('tt-impact').textContent=data.impact;
    tooltip.className='tooltip visible '+data.cls;
    var touch=e.touches[0];
    tooltip.style.left=(touch.clientX+12)+'px';
    tooltip.style.top=(touch.clientY-60)+'px';
    tooltip.style.position='fixed';
    setTimeout(function(){tooltip.classList.remove('visible');},2500);
  },{passive:true});
});

function positionTooltip(e){
  var x=e.clientX+14, y=e.clientY-70;
  if(x+190>window.innerWidth) x=e.clientX-200;
  if(y<0) y=e.clientY+20;
  tooltip.style.left=x+'px';
  tooltip.style.top=y+'px';
  tooltip.style.position='fixed';
}

applyTransform();
</script>
</body>
</html>
