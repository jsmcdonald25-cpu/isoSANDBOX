<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="robots" content="noindex, nofollow">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>SLAB LAB — GrailISO</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script data-cfasync="false" src="/js/supabase.js"></script>
  <style>
    :root{--bg:#0D1F33;--blue:#00AAFF;--green:#00E887;--gold:#FFB800;--red:#FF3B5C;--white:#FFFFFF;--deep2:#0a1929;--deep3:#061420;--muted:#7a95ae;--border:rgba(0,170,255,0.15);--panel-bg:rgba(8,20,36,0.92)}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden;background:var(--bg)}
    body{color:var(--white);font-family:'Barlow Condensed',sans-serif;display:flex;flex-direction:column;height:100vh}
    .sl-header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px 8px;flex-shrink:0;border-bottom:1px solid var(--border);background:rgba(10,25,41,0.60);backdrop-filter:blur(8px);gap:12px}
    .sl-back-btn{background:rgba(0,170,255,0.08);border:1px solid rgba(0,170,255,0.28);border-radius:8px;color:var(--blue);font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;padding:5px 14px;transition:background .2s;white-space:nowrap;flex-shrink:0}
    .sl-back-btn:hover{background:rgba(0,170,255,0.18)}
    .sl-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:5px;color:var(--white);white-space:nowrap}
    .sl-card-info{text-align:right;min-width:0;flex:1;max-width:260px}
    .sl-card-name{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--white);line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sl-card-detail{font-size:10px;color:var(--muted);letter-spacing:.5px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sl-main{flex:1;display:flex;min-height:0;overflow:hidden}
    .sl-panel{width:280px;flex-shrink:0;display:flex;flex-direction:column;padding:16px;overflow:hidden}
    .sl-panel-left{padding-left:20px;padding-right:8px}
    .sl-panel-right{padding-right:20px;padding-left:8px}
    .sl-panel-inner{flex:1;background:var(--panel-bg);border:1px solid var(--border);border-radius:14px;display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;backdrop-filter:blur(12px)}
    .sl-panel-inner::-webkit-scrollbar{width:4px}
    .sl-panel-inner::-webkit-scrollbar-thumb{background:rgba(0,170,255,0.2);border-radius:4px}
    .sl-panel-section{padding:16px 18px;border-bottom:1px solid var(--border)}
    .sl-panel-section:last-child{border-bottom:none}
    .sl-panel-label{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;color:var(--muted);margin-bottom:10px}
    .sl-viewer{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;min-height:0;overflow:hidden}
    .sl-spotlight-wrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:0}
    #slabSpotlight{width:520px;height:520px;border-radius:50%;filter:blur(55px);transition:background .45s,opacity .45s;opacity:0}
    #slabScene{perspective:900px;cursor:grab;touch-action:none;user-select:none;position:relative;z-index:1;flex-shrink:0}
    #slabScene:active{cursor:grabbing}
    #slabUnit{transform-style:preserve-3d;will-change:transform;position:relative;width:346px;height:500px}
    .sl-viewer-controls{display:flex;gap:8px;margin-top:14px;flex-shrink:0;z-index:1}
    .sl-ctrl-btn{padding:6px 20px;background:rgba(0,170,255,0.07);border:1px solid rgba(0,170,255,0.22);border-radius:8px;color:var(--blue);font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:background .2s}
    .sl-ctrl-btn:hover{background:rgba(0,170,255,0.16)}
    .sl-choose-btn{width:100%;padding:10px 12px;background:linear-gradient(135deg,rgba(0,170,255,0.12),rgba(0,170,255,0.06));border:1px solid rgba(0,170,255,0.35);border-radius:8px;color:var(--blue);font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2.5px;cursor:pointer;transition:all .2s;text-align:center}
    .sl-choose-btn:hover{background:rgba(0,170,255,0.22)}
    .sl-active-color{display:flex;align-items:center;gap:12px;margin-bottom:4px}
    .sl-active-swatch{width:36px;height:36px;border-radius:8px;border:2px solid rgba(255,255,255,0.15);flex-shrink:0}
    .sl-active-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--white);line-height:1}
    .sl-active-desc{font-size:11px;color:var(--muted);letter-spacing:.3px;line-height:1.4;margin-top:2px}
    .sl-finish-row{display:flex;gap:4px;background:rgba(0,0,0,0.30);border-radius:10px;padding:3px;border:1px solid var(--border)}
    .sl-finish-btn{flex:1;padding:7px 10px;border-radius:7px;border:none;font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:2.5px;cursor:pointer;transition:all .2s;background:transparent;color:var(--muted);text-align:center}
    #slabSwatches{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;justify-items:center}
    .swatch{width:34px;height:34px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .18s,box-shadow .18s}
    .swatch:hover{transform:scale(1.15)}
    .swatch.active{transform:scale(1.22);box-shadow:0 0 0 2px rgba(5,16,28,0.9),0 0 0 4px rgba(255,255,255,0.65)}
    .sl-slider-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .sl-slider-row:last-child{margin-bottom:0}
    .sl-slider-name{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);width:80px;flex-shrink:0}
    .sl-slider-val{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:1px;color:var(--blue);width:36px;text-align:right;flex-shrink:0}
    input[type="range"]{flex:1;-webkit-appearance:none;appearance:none;height:4px;background:rgba(0,170,255,0.15);border-radius:4px;outline:none}
    input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--blue);cursor:pointer;border:2px solid var(--deep2)}
    .sl-toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .sl-toggle-row:last-child{margin-bottom:0}
    .sl-toggle-name{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
    .sl-toggle{width:38px;height:20px;background:rgba(0,170,255,0.12);border:1px solid rgba(0,170,255,0.25);border-radius:12px;cursor:pointer;position:relative;transition:background .2s,border-color .2s;flex-shrink:0}
    .sl-toggle.on{background:rgba(0,170,255,0.35);border-color:var(--blue)}
    .sl-toggle::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:var(--muted);transition:transform .2s,background .2s}
    .sl-toggle.on::after{transform:translateX(18px);background:var(--blue)}
    .sl-bg-options,.sl-speed-row{display:flex;gap:6px}
    .sl-bg-opt,.sl-speed-btn{flex:1;padding:6px 4px;border:1px solid var(--border);border-radius:6px;background:transparent;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1.2px;text-transform:uppercase;text-align:center;cursor:pointer;transition:all .2s}
    .sl-bg-opt.active,.sl-speed-btn.active{background:rgba(0,170,255,0.12);border-color:var(--blue);color:var(--blue)}
    .sl-viewer.bg-grid::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,170,255,0.18) 1px,transparent 1px),linear-gradient(90deg,rgba(0,170,255,0.18) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
    .sl-viewer.bg-dots::before{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(0,170,255,0.22) 1.5px,transparent 1.5px);background-size:24px 24px;pointer-events:none;z-index:0}
    .sl-viewer.bg-none::before{display:none}
    @media(max-height:700px){#slabUnit{transform:scale(0.80);transform-origin:center center}#slabScene{perspective:720px}}
    @media(max-height:580px){#slabUnit{transform:scale(0.65);transform-origin:center center}}
    @media(max-width:1024px){.sl-panel{width:220px}}
    @media(max-width:860px){.sl-main{flex-direction:column}.sl-panel{width:100%;padding:0;max-height:200px}.sl-panel-inner{border-radius:0;border-left:none;border-right:none}#slabSwatches{grid-template-columns:repeat(6,1fr)}.sl-panel-left{order:2}.sl-viewer{order:0}.sl-panel-right{order:1}}
  </style>
</head>
<body>

<div class="sl-header">
  <button class="sl-back-btn" onclick="goBack()">&#8592; Dashboard</button>
  <div class="sl-title">&#129514; SLAB LAB</div>
  <div class="sl-card-info">
    <div class="sl-card-name" id="slCardName">Shohei Ohtani</div>
    <div class="sl-card-detail" id="slCardDetail">CARD OF THE DAY · 2025 · Topps · B&W · #001</div>
  </div>
</div>

<div class="sl-main" id="slMain">

  <!-- LEFT PANEL — Controls -->
  <div class="sl-panel sl-panel-left"><div class="sl-panel-inner">
    <div class="sl-panel-section"><button class="sl-choose-btn" onclick="chooseCard()">CHOOSE CARD</button></div>
    <div class="sl-panel-section">
      <div class="sl-panel-label">LIGHTING</div>
      <div class="sl-slider-row"><span class="sl-slider-name">Glow</span><input type="range" id="slGlow" min="0" max="100" value="100" oninput="onGlowChange(this.value)"><span class="sl-slider-val" id="slGlowVal">100</span></div>
      <div class="sl-slider-row"><span class="sl-slider-name">Ambient</span><input type="range" id="slAmbient" min="0" max="100" value="50" oninput="onAmbientChange(this.value)"><span class="sl-slider-val" id="slAmbientVal">50</span></div>
    </div>
    <div class="sl-panel-section">
      <div class="sl-panel-label">DISPLAY</div>
      <div class="sl-toggle-row"><span class="sl-toggle-name">Edge Light</span><div class="sl-toggle on" id="togEdgeLight" onclick="toggleEdgeLight()"></div></div>
      <div class="sl-toggle-row"><span class="sl-toggle-name">Slab Shadow</span><div class="sl-toggle on" id="togShadow" onclick="toggleShadow()"></div></div>
      <div class="sl-toggle-row"><span class="sl-toggle-name">Card Visible</span><div class="sl-toggle on" id="togCard" onclick="toggleCard()"></div></div>
    </div>
    <div class="sl-panel-section">
      <div class="sl-panel-label">BACKGROUND</div>
      <div class="sl-bg-options"><button class="sl-bg-opt active" id="bg-grid" onclick="setBg('grid')">Grid</button><button class="sl-bg-opt" id="bg-dots" onclick="setBg('dots')">Dots</button><button class="sl-bg-opt" id="bg-none" onclick="setBg('none')">None</button></div>
    </div>
    <div class="sl-panel-section">
      <div class="sl-panel-label">SPIN SPEED</div>
      <div class="sl-speed-row"><button class="sl-speed-btn" id="speed-slow" onclick="setSpinSpeed('slow')">Slow</button><button class="sl-speed-btn active" id="speed-med" onclick="setSpinSpeed('med')">Med</button><button class="sl-speed-btn" id="speed-fast" onclick="setSpinSpeed('fast')">Fast</button><button class="sl-speed-btn" id="speed-off" onclick="setSpinSpeed('off')">Off</button></div>
    </div>
  </div></div>

  <!-- CENTER — Slab Viewer -->
  <div class="sl-viewer bg-grid" id="slViewer">
    <div class="sl-spotlight-wrap"><div id="slabSpotlight"></div></div>
    <div id="slabScene">
      <div id="slabUnit">
        <!-- FRONT — exact copy of dashboard HTML -->
        <div id="slabFrontFace" style="position:absolute;inset:0;border-radius:12px;overflow:hidden;backface-visibility:hidden;-webkit-backface-visibility:hidden">
          <img id="slabFrameF" src="GRAILISO_slab.png" style="position:absolute;inset:0;width:100%;height:100%;display:block;transition:filter .35s;z-index:1" alt="">
          <div style="position:absolute;left:19px;top:129px;width:299px;height:345px;z-index:2;display:flex;align-items:center;justify-content:center">
            <img id="slabCardFront" style="width:100%;height:100%;display:block;border-radius:9px;object-fit:fill" alt="">
          </div>
        </div>
        <!-- BACK — exact copy of dashboard HTML -->
        <div id="slabBackFace" style="position:absolute;inset:0;border-radius:12px;overflow:hidden;backface-visibility:hidden;-webkit-backface-visibility:hidden;transform:rotateY(180deg)">
          <img id="slabFrameB" src="GRAILISO_slab.png" style="position:absolute;inset:0;width:100%;height:100%;display:block;transform:scaleX(-1);transition:filter .35s;z-index:1" alt="">
          <div style="position:absolute;left:-20.5px;top:127px;width:387px;height:348px;z-index:2;border-radius:8px;overflow:hidden;box-shadow:none">
            <img id="slabCardBack" style="width:100%;height:100%;object-fit:contain;display:block;border-radius:8px;box-shadow:none" alt="">
          </div>
        </div>
      </div>
    </div>
    <div class="sl-viewer-controls">
      <button class="sl-ctrl-btn" onclick="slabFlip()">Flip</button>
      <button class="sl-ctrl-btn" id="slab-spin-btn" onclick="slabToggleSpin()">Auto Spin</button>
      <button class="sl-ctrl-btn" onclick="slabReset()">Reset</button>
    </div>
    <div style="margin-top:10px;font-size:11px;letter-spacing:1px;color:var(--muted);text-align:center">CLICK &amp; DRAG TO ROTATE</div>
  </div>

  <!-- RIGHT PANEL — Colors -->
  <div class="sl-panel sl-panel-right"><div class="sl-panel-inner">
    <div class="sl-panel-section">
      <div class="sl-active-color"><div class="sl-active-swatch" id="slActiveSwatch"></div><div><div class="sl-active-name" id="slColorLabel">COBALT · CRYSTAL</div><div class="sl-active-desc" id="slColorDesc"></div></div></div>
    </div>
    <div class="sl-panel-section">
      <div class="sl-panel-label">FINISH</div>
      <div class="sl-finish-row"><button class="sl-finish-btn" id="finish-matte" onclick="setSlabFinish('matte')">MATTE</button><button class="sl-finish-btn" id="finish-crystal" onclick="setSlabFinish('crystal')">CRYSTAL</button><button class="sl-finish-btn" id="finish-vivid" onclick="setSlabFinish('vivid')">VIVID</button></div>
    </div>
    <div class="sl-panel-section">
      <div class="sl-panel-label">SLAB COLOR</div>
      <div id="slabSwatches"></div>
    </div>
  </div></div>

</div>

var _finish='crystal',_activeIdx=2,_rotX=0,_rotY=0,_flipped=false;
var _dragging=false,_lastX=0,_lastY=0,_spinner=null,_spinning=false,_listenersAttached=false;
var _glowMult=1.0,_edgeLight=true,_shadowOn=true,_cardVisible=true,_spinSpeed=0.38;

// Shared slab image setter — matches dashboard _slabSetImages exactly
function _slabSetImages(frontUrl, backUrl, frontLandscape, backLandscape){
  var cf=document.getElementById('slabCardFront');
  var cb=document.getElementById('slabCardBack');
  if(cf) cf.src=frontUrl||DEFAULT_FRONT;
  if(cb) cb.src=backUrl||DEFAULT_BACK;
  // Front face orientation
  var ff=document.getElementById('slabFrontFace');
  if(ff) ff.style.transform=frontLandscape?'rotateZ(90deg)':'';
  if(cf) cf.style.transform=frontLandscape?'rotate(-90deg)':'';
  // Back face orientation
  var bf=document.getElementById('slabBackFace');
  if(bf) bf.style.transform=backLandscape?'rotateY(180deg) rotateZ(90deg)':'rotateY(180deg)';
  if(cb) cb.style.transform=backLandscape?'rotate(-90deg)':'';
}

function _detectAndSetImages(frontUrl, backUrl, knownFrontLand, knownBackLand){
  // If orientations are pre-known (passed from dashboard), skip probe
  if(typeof knownFrontLand === 'boolean' && typeof knownBackLand === 'boolean'){
    _slabSetImages(frontUrl||DEFAULT_FRONT, backUrl||DEFAULT_BACK, knownFrontLand, knownBackLand);
    return;
  }
  // Otherwise load images, detect orientation on load, then apply
  var fImg=new Image(), bImg=new Image();
  var fLand=false, bLand=false, fLoaded=false, bLoaded=false;
  function apply(){ if(fLoaded&&bLoaded) _slabSetImages(frontUrl,backUrl,fLand,bLand); }
  fImg.onload=function(){ fLand=this.naturalWidth>this.naturalHeight; fLoaded=true; apply(); };
  fImg.onerror=function(){ fLoaded=true; apply(); };
  bImg.onload=function(){ bLand=this.naturalWidth>this.naturalHeight; bLoaded=true; apply(); };
  bImg.onerror=function(){ bLoaded=true; apply(); };
  fImg.src=frontUrl||DEFAULT_FRONT;
  bImg.src=backUrl||DEFAULT_BACK;
}

function init(){
  _detectAndSetImages(DEFAULT_FRONT, DEFAULT_BACK);
  _buildSwatches();
  _applyColor(_activeIdx);
  _updateFinishBtns();
  _initRotation();
  // Check query params for card data
  var p=new URLSearchParams(window.location.search);
  var vid=p.get('vault_id');
  var frontParam=p.get('front');
  if(vid){
    _loadVaultCard(vid);
  } else if(frontParam){
    // Card images passed directly from ISOVault card detail
    var backParam=p.get('back');
    var labelParam=p.get('label')||'';
    var frontLand=p.get('fl')==='1';
    var backLand=p.get('bl')==='1';
    _detectAndSetImages(frontParam, backParam||DEFAULT_BACK, frontLand, backLand);
    if(labelParam){
      var parts=labelParam.split('·').map(function(s){return s.trim()});
      var nameEl=document.getElementById('slCardName');
      var detailEl=document.getElementById('slCardDetail');
      if(nameEl) nameEl.textContent=parts[0]||'—';
      if(detailEl) detailEl.textContent=parts.slice(1).join(' · ')||'';
    }
  }
}

async function _loadVaultCard(vid){
  try{
    var sb=supabase.createClient(SB_URL,SB_KEY);
    var s=await sb.auth.getSession();
    if(!s.data.session) return;
    var t=s.data.session.access_token;
    var r=await fetch(SB_REST+'/vault?id=eq.'+encodeURIComponent(vid)+'&select=front_image_url,back_image_url,player,year,brand,set_name,parallel,card_number&limit=1',
      {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+t,'Accept':'application/json'}});
    if(!r.ok) return;
    var rows=await r.json();
    if(!rows||!rows.length) return;
    var row=rows[0];
    _detectAndSetImages(row.front_image_url, row.back_image_url);
    document.getElementById('slCardName').textContent=row.player||'—';
    document.getElementById('slCardDetail').textContent=[row.year,row.brand,row.set_name,row.parallel,row.card_number?'#'+row.card_number:null].filter(Boolean).join(' · ');
  }catch(e){}
}

// 3D rotation
function _applyTransform(){var u=document.getElementById('slabUnit');if(!u)return;u.style.transform='rotateY('+(_rotY+(_flipped?180:0))+'deg) rotateX('+(Math.max(-50,Math.min(50,_rotX)))+'deg)'}
function _initRotation(){
  if(_listenersAttached)return;_listenersAttached=true;
  var sc=document.getElementById('slabScene');if(!sc)return;
  sc.addEventListener('mousedown',function(e){_dragging=true;_lastX=e.clientX;_lastY=e.clientY;sc.style.cursor='grabbing';stopSpin()});
  window.addEventListener('mousemove',function(e){if(!_dragging)return;_rotY+=(e.clientX-_lastX)*0.55;_rotX-=(e.clientY-_lastY)*0.35;_lastX=e.clientX;_lastY=e.clientY;_applyTransform()});
  window.addEventListener('mouseup',function(){_dragging=false;var s=document.getElementById('slabScene');if(s)s.style.cursor='grab'});
  sc.addEventListener('touchstart',function(e){_lastX=e.touches[0].clientX;_lastY=e.touches[0].clientY;stopSpin()},{passive:true});
  sc.addEventListener('touchmove',function(e){e.preventDefault();_rotY+=(e.touches[0].clientX-_lastX)*0.55;_rotX-=(e.touches[0].clientY-_lastY)*0.35;_lastX=e.touches[0].clientX;_lastY=e.touches[0].clientY;_applyTransform()},{passive:false});
}
function slabFlip(){_flipped=!_flipped;_rotX=0;_rotY=0;_applyTransform()}
function startSpin(spd){if(_spinner)clearInterval(_spinner);_spinning=true;_spinSpeed=spd;_spinner=setInterval(function(){if(!_dragging){_rotY+=spd;_applyTransform()}},16);var b=document.getElementById('slab-spin-btn');if(b)b.textContent='Stop'}
function stopSpin(){if(_spinner){clearInterval(_spinner);_spinner=null}_spinning=false;var b=document.getElementById('slab-spin-btn');if(b)b.textContent='Auto Spin'}
function slabToggleSpin(){_spinning?stopSpin():startSpin(_spinSpeed||0.38)}
function slabReset(){stopSpin();_flipped=false;_rotX=0;_rotY=0;_applyTransform()}

// Color + Finish
function setSlabFinish(f){_finish=f;_updateFinishBtns();_applyColor(_activeIdx)}
function _updateFinishBtns(){['matte','crystal','vivid'].forEach(function(id){var b=document.getElementById('finish-'+id);if(!b)return;if(id===_finish){b.style.background=id==='vivid'?'linear-gradient(135deg,#ff3b5c,#ff8800)':id==='matte'?'rgba(110,120,130,0.55)':'var(--blue)';b.style.color='#fff'}else{b.style.background='transparent';b.style.color='var(--muted)'}})}
function _buildSwatches(){var w=document.getElementById('slabSwatches');if(!w)return;w.innerHTML=SLAB_COLORS.map(function(s,i){return'<div class="swatch" id="swatch-'+i+'" onclick="_applyColor('+i+')" style="background:'+s.swatchBg+';border-color:'+s.swatchBorder+'" title="'+s.label+'"></div>'}).join('')}
function _applyColor(idx){
  var c=SLAB_COLORS[idx];if(!c)return;_activeIdx=idx;
  var s=c[_finish];if(!s)return;
  var f;
  if(_finish==='matte'){
    // Matte: crush specular highlights baked into the PNG
    // Lower brightness kills bright streaks, high contrast flattens tonal range,
    // low saturate removes color glow, sepia deadens remaining shine
    f='hue-rotate('+s.hue+'deg) saturate('+s.sat+') brightness('+(s.bri*0.7)+') contrast('+(s.con*1.15)+') sepia(0.12)';
  } else {
    f='hue-rotate('+s.hue+'deg) saturate('+s.sat+') brightness('+s.bri+') contrast('+s.con+')';
  }
  ['slabFrameF','slabFrameB'].forEach(function(id){var el=document.getElementById(id);if(el)el.style.filter=f});
  // All shadow/glow applied to front face only (backface-visibility hides it on back)
  var front=document.getElementById('slabFrontFace');
  var back=document.getElementById('slabBackFace');
  if(back) back.style.boxShadow='none';
  var shadows=[];
  if(_finish==='matte'){
    // Matte: no edge glow, no spotlight
    var spot=document.getElementById('slabSpotlight');
    if(spot){spot.style.opacity='0';spot.style.background='transparent'}
  } else {
    // Edge light glow — scaled by glow slider
    if(_edgeLight&&s.glow!=='transparent'&&_glowMult>0){
      var edgeSpread=Math.round(40*_glowMult);
      var edgeBlur=Math.round(8*_glowMult);
      shadows.push('0 0 '+edgeSpread+'px '+edgeBlur+'px '+s.glow);
    }
    // Spotlight — ambient glow behind slab
    var spot=document.getElementById('slabSpotlight');
    if(spot){
      if(_glowMult===0){spot.style.opacity='0';spot.style.background='transparent'}
      else{var intensity=_finish==='vivid'?0.62:0.42;spot.style.background='radial-gradient(circle,'+s.glow+' 0%,transparent 68%)';spot.style.opacity=String(intensity*_glowMult)}
    }
  }
  // Slab shadow — dark drop shadow beneath the slab
  if(_shadowOn) shadows.push('0 20px 40px rgba(0,0,0,0.5)');
  if(front) front.style.boxShadow=shadows.length?shadows.join(','):'none';
  // Scene filter off (drop-shadow was bleeding onto back)
  var scene=document.getElementById('slabScene');
  if(scene) scene.style.filter='none';
  var lbl=document.getElementById('slColorLabel'),desc=document.getElementById('slColorDesc');
  if(lbl) lbl.textContent=c.label.toUpperCase()+' \u00B7 '+_finish.toUpperCase();
  if(desc) desc.textContent=s.desc;
  var asw=document.getElementById('slActiveSwatch');if(asw) asw.style.background=c.swatchBg;
  SLAB_COLORS.forEach(function(_,i){var sw=document.getElementById('swatch-'+i);if(sw) sw.classList.toggle('active',i===idx)});
}

// Panel controls
function onGlowChange(v){_glowMult=v/100;document.getElementById('slGlowVal').textContent=v;_applyColor(_activeIdx)}
function onAmbientChange(v){document.getElementById('slAmbientVal').textContent=v;var vw=document.getElementById('slViewer');if(vw)vw.style.background='hsl(210,45%,'+(13+(v/100)*12)+'%)'}
function toggleEdgeLight(){_edgeLight=!_edgeLight;document.getElementById('togEdgeLight').classList.toggle('on',_edgeLight);_applyColor(_activeIdx)}
function toggleShadow(){_shadowOn=!_shadowOn;document.getElementById('togShadow').classList.toggle('on',_shadowOn);_applyColor(_activeIdx)}
function toggleCard(){_cardVisible=!_cardVisible;document.getElementById('togCard').classList.toggle('on',_cardVisible);var v=_cardVisible?'visible':'hidden';['slabCardFront','slabCardBack'].forEach(function(id){var el=document.getElementById(id);if(el)el.style.visibility=v})}
function setBg(m){var vw=document.getElementById('slViewer');vw.classList.remove('bg-grid','bg-dots','bg-none');vw.classList.add('bg-'+m);['grid','dots','none'].forEach(function(id){var b=document.getElementById('bg-'+id);if(b)b.classList.toggle('active',id===m)})}
function setSpinSpeed(m){var sp={slow:0.18,med:0.38,fast:1.0,off:0};_spinSpeed=sp[m]||0.38;['slow','med','fast','off'].forEach(function(id){var b=document.getElementById('speed-'+id);if(b)b.classList.toggle('active',id===m)});if(m==='off')stopSpin();else{if(_spinning)stopSpin();startSpin(_spinSpeed)}}

// Nav
function goBack(){stopSpin();window.location.href='dashboard.html'}
function chooseCard(){stopSpin();window.location.href='dashboard.html#library&slabpick=1'}

init();
