# ============================================================
# GRAILISO — netlify.toml
# Site: isosandbox.com
# Repo: jsmcdonald25-cpu/isoSANDBOX
# ============================================================
[build]
  publish = "/"

# ── REDIRECTS ──────────────────────────────────────────────
# Root → dashboard
[[redirects]]
  from = "/"
  to = "/dashboard.html"
  status = 302

# Clean URLs
[[redirects]]
  from = "/catalog"
  to = "/card-catalog.html"
  status = 302

[[redirects]]
  from = "/vault"
  to = "/vault-ui-mockup.html"
  status = 302

[[redirects]]
  from = "/auth"
  to = "/auth.html"
  status = 302

# ── HEADERS ────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com https://js.stripe.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.stripe.com https://site.api.espn.com https://*.basemaps.cartocdn.com; img-src 'self' data: https://*.supabase.co https://*.basemaps.cartocdn.com https://www.ebay.com https://*.ebayimg.com; frame-src https://js.stripe.com;"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
