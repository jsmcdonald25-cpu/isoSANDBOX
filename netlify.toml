# ============================================================
# GRAILISO — netlify.toml
# Site: isosandbox.com
# Repo: jsmcdonald25-cpu/isoSANDBOX
# ============================================================
[build]
  publish = "/"

[functions]
  node_bundler = "esbuild"

# ── REDIRECTS ──────────────────────────────────────────────
# Root → dashboard
[[redirects]]
  from = "/"
  to = "/dashboard.html"
  status = 302

# Clean URLs
[[redirects]]
  from = "/catalog"
  to = "/card-catalog.html"
  status = 302

[[redirects]]
  from = "/vault"
  to = "/vault-ui-mockup.html"
  status = 302

[[redirects]]
  from = "/auth"
  to = "/auth.html"
  status = 302

# ── HEADERS ────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # CSP removed during alpha — was blocking Supabase, eBay, ESPN, fonts, tiles. Revisit post-alpha.

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/**/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
