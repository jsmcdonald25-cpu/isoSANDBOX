name: ISOSerial Crawler

# Hourly (was every 30 min) — slowed 2026-04-23 because 3-sort-pass + expanded
# query set + manual runs were stacking and triggering eBay 429 rate limits.
# 24 runs/day × ~114 search calls = ~2,700 search calls/day. Under the 5000/day
# eBay budget with headroom for ISOsnipe + manual adds.

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: {}      # allow manual trigger from the Actions tab

concurrency:
  # Skip a run if the previous run is still going. Prevents overlap if a bootstrap
  # surge causes a run to take longer than 30 min.
  group: iso-serial-crawler
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 10      # hard cap — we expect <1 min in steady state

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install deps (dotenv only)
        run: npm ci --omit=dev || npm install --omit=dev

      - name: Run ISOSerial crawler
        env:
          EBAY_CLIENT_ID: ${{ secrets.EBAY_CLIENT_ID }}
          EBAY_CLIENT_SECRET: ${{ secrets.EBAY_CLIENT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node iso-serial/runner.js

      - name: Update AI learning stats
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node iso-serial/compute-stats.js
        continue-on-error: true   # non-fatal — crawler result matters more than stats rollup
